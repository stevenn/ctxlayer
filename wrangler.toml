name = "ctxlayer"
main = "apps/worker/src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# SPA shipped from this Worker. The `dist` directory is produced by
# `bun run build:web`. API/MCP routes are evaluated before the Asset
# resolver so they don't get shadowed by the SPA index.html.
[assets]
directory = "./apps/web/dist"
binding = "ASSETS"
run_worker_first = [
  "/api/*",
  "/mcp/*",
  "/sse/*",
  "/oauth/*",
  "/idp/*",
  "/collab/*",
  "/.well-known/*"
]

# ---------------------------------------------------------------------------
# Bindings. IDs marked <TODO> are placeholders — populate via:
#   wrangler d1 create ctxlayer
#   wrangler kv namespace create OAUTH_KV
#   wrangler r2 bucket create ctxlayer-docs
#   wrangler vectorize create ctxlayer-docs --dimensions 768 --metric cosine
# ---------------------------------------------------------------------------

[[d1_databases]]
binding = "DB"
database_name = "ctxlayer"
database_id = "00000000-0000-0000-0000-000000000000"  # <TODO>
migrations_dir = "apps/worker/src/db/migrations"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "0000000000000000000000000000000000"  # <TODO>

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "ctxlayer-docs"

[[vectorize]]
binding = "DOCS_INDEX"
index_name = "ctxlayer-docs"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "MCP_SESSION_DO"
class_name = "McpSessionDO"

[[durable_objects.bindings]]
name = "DOC_ROOM_DO"
class_name = "DocRoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["McpSessionDO", "DocRoomDO"]

[[queues.producers]]
binding = "USAGE_QUEUE"
queue = "ctxlayer-usage"

[[queues.producers]]
binding = "DOC_REINDEX_QUEUE"
queue = "ctxlayer-reindex"

[[queues.consumers]]
queue = "ctxlayer-usage"
max_batch_size = 100
max_batch_timeout = 5

[[queues.consumers]]
queue = "ctxlayer-reindex"
max_batch_size = 10
max_batch_timeout = 30

[triggers]
crons = ["0 3 * * *"]  # nightly: prune usage_events, refresh upstream_tools

[vars]
PUBLIC_BASE_URL = "http://localhost:8787"
ALLOWED_GOOGLE_HD = ""           # e.g. "acme.com"; empty disables Google sign-in
ALLOWED_GITHUB_ORG = ""          # e.g. "acme-inc"; empty disables GitHub sign-in
ADMIN_EMAILS = ""                # comma-separated bootstrap admins
DAYTONA_API_URL = "https://app.daytona.io/api"
DAYTONA_DEFAULT_IDLE_SECONDS = "600"
MAX_SANDBOXES_PER_USER = "5"
